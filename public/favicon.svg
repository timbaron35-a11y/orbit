<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background pill -->
  <rect width="64" height="64" rx="16" fill="#7c5cfc"/>

  <!-- Outer orbit ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>

  <!-- Mid orbit ring -->
  <circle cx="32" cy="32" r="13.5" fill="none" stroke="white" stroke-width="2" opacity="0.45"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="5" fill="white"/>

  <!-- Orbiting dot (top of outer ring) -->
  <circle cx="32" cy="11" r="3.5" fill="white"/>

  <!-- Subtle inner glow -->
  <circle cx="32" cy="32" r="5" fill="white" opacity="0.3"/>
</svg>
